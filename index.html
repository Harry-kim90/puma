<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUN TO COMPLETE SEOUL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: #222222;
  --text: #f0f0f0;
  --muted: #666;
  --c0: #E8FF47;
  --c1: #47FFD4;
  --c2: #FF6B47;
  --c3: #C447FF;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); font-family: var(--sans); }
body { min-height: 100vh; overflow-x: hidden; }

/* ── GLITCH HEADER ── */
.hero {
  position: relative;
  padding: 3rem 1.5rem 2rem;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
  /* 수정된 부분: 배경 이미지 적용 */
  background-image: url('main-bg.jpg');
  background-size: cover;
  background-position: center;
}
.hero-bg {
  position: absolute; inset: 0;
  /* 수정된 부분: 이미지가 밝을 경우를 대비해 텍스트가 잘 보이도록 어두운 반투명 막 적용 */
  background: rgba(0, 0, 0, 0.6) repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.015) 2px, rgba(255,255,255,.015) 4px);
  pointer-events: none;
}
.hero-grid {
  display: flex; justify-content: space-between; align-items: flex-start;
  max-width: 700px; margin: 0 auto;
}
.campaign-tag {
  font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
  color: #fff; text-transform: uppercase; margin-bottom: .6rem;
}
.hero-title {
  font-family: var(--mono); font-size: clamp(1.6rem, 6vw, 2.8rem);
  font-weight: 700; line-height: 1.1; letter-spacing: -1px;
  position: relative;
}
.hero-title .glitch {
  position: relative; display: inline-block;
  animation: glitch-flicker 4s infinite;
}
.hero-title .glitch::before,
.hero-title .glitch::after {
  content: attr(data-text); position: absolute; inset: 0;
  clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
}
.hero-title .glitch::before { color: var(--c2); animation: glitch-a 3s infinite; transform: translateX(-2px); }
.hero-title .glitch::after  { color: var(--c1); clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%); animation: glitch-b 3s infinite; transform: translateX(2px); }
@keyframes glitch-a { 0%,90%,100%{opacity:0} 91%,95%{opacity:.8} }
@keyframes glitch-b { 0%,85%,100%{opacity:0} 86%,92%{opacity:.8} }
@keyframes glitch-flicker { 0%,98%,100%{opacity:1} 99%{opacity:.85} }

.dday-badge {
  font-family: var(--mono); font-size: 11px;
  border: 1px solid rgba(255,255,255,0.3); padding: .4rem .8rem;
  color: #fff; white-space: nowrap; margin-top: .4rem;
  background: rgba(0,0,0,0.4);
}
.dday-badge span { color: var(--c0); }

/* ── USER BAR ── */
.user-bar {
  max-width: 700px; margin: 1.2rem auto 0;
  display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
  position: relative; z-index: 10;
}
.user-chip {
  font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
  padding: .3rem .8rem; border: 1px solid; border-radius: 2px;
  background: rgba(0,0,0,0.6);
}
.nav-links { display: flex; gap: .5rem; margin-left: auto; }
.nav-links a {
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
  color: #fff; text-decoration: none; padding: .3rem .6rem;
  border: 1px solid rgba(255,255,255,0.3); transition: all .2s;
  background: rgba(0,0,0,0.6);
}
.nav-links a:hover { color: var(--c0); border-color: var(--c0); }

/* ── MAIN LAYOUT ── */
.main { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 6rem; }

/* ── SEOUL UNLOCK VISUAL ── */
.seoul-section {
  border: 1px solid var(--border); margin-bottom: 1.5rem; position: relative; overflow: hidden;
}
.section-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 3px;
  color: var(--muted); padding: .6rem 1rem; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.section-label .pct { color: var(--c0); }

.seoul-canvas { position: relative; width: 100%; height: 200px; overflow: hidden; }
.seoul-svg { width: 100%; height: 100%; display: block; }

/* Scanline overlay */
.seoul-canvas::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.3) 3px, rgba(0,0,0,.3) 4px);
}

.landmark-strip {
  display: flex; border-top: 1px solid var(--border);
}
.lm-item {
  flex: 1; padding: .6rem .5rem; text-align: center;
  border-right: 1px solid var(--border); position: relative;
  transition: background .4s;
}
.lm-item:last-child { border-right: none; }
.lm-icon { font-size: 14px; line-height: 1; margin-bottom: .2rem; filter: grayscale(1); opacity: .3; transition: all .5s; }
.lm-name { font-family: var(--mono); font-size: 9px; color: var(--muted); }
.lm-km   { font-family: var(--mono); font-size: 8px; color: var(--border); margin-top: 1px; }
.lm-item.unlocked .lm-icon { filter: none; opacity: 1; }
.lm-item.unlocked .lm-name { color: var(--c0); }
.lm-item.unlocked .lm-km   { color: var(--muted); }
.lm-item.unlocked { background: rgba(232,255,71,.04); }

/* ── PROGRESS ROW ── */
.progress-row {
  display: flex; gap: .8rem; margin-bottom: 1.5rem;
}
.prog-block {
  flex: 1; border: 1px solid var(--border); padding: .8rem .9rem;
}
.prog-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-bottom: .4rem; }
.prog-value { font-family: var(--mono); font-size: 1.3rem; font-weight: 700; }
.prog-sub   { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: .2rem; }

/* ── RANKING ── */
.rank-section { margin-bottom: 1.5rem; }
.rank-item {
  display: grid; grid-template-columns: 2rem 1fr auto auto;
  align-items: center; gap: .6rem;
  padding: .9rem 1rem; border: 1px solid var(--border); border-bottom: none;
  transition: background .2s;
}
.rank-item:last-child { border-bottom: 1px solid var(--border); }
.rank-item:hover { background: rgba(255,255,255,.02); }
.rank-num {
  font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--border);
}
.rank-num.top { color: var(--c0); }
.rank-name { font-size: .85rem; font-weight: 500; }
.rank-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: .4rem; }
.rank-km { font-family: var(--mono); font-size: .75rem; color: var(--muted); }
.rank-score { font-family: var(--mono); font-size: 1rem; font-weight: 700; }

.score-bar-wrap { grid-column: 1/-1; height: 2px; background: var(--border); margin-top: .3rem; }
.score-bar { height: 100%; transition: width .8s ease; }

/* ── MISSION CARD ── */
.mission-section { border: 1px solid var(--border); margin-bottom: 1.5rem; }
.mission-header { padding: .7rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.mission-week { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.mission-body { padding: .8rem 1rem; display: flex; flex-direction: column; gap: .6rem; }
.mission-row { display: flex; align-items: center; gap: .6rem; }
.m-check { width: 16px; height: 16px; border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.m-check.done { border-color: var(--c0); color: var(--c0); background: rgba(232,255,71,.1); }
.m-text { font-size: .8rem; color: var(--muted); }
.m-text.done { color: var(--text); }

/* ── MY TEAM ── */
.my-team-section { border: 1px solid var(--border); margin-bottom: 1.5rem; }
.contrib-bar-wrap { padding: .8rem 1rem; }
.contrib-label { display: flex; justify-content: space-between; margin-bottom: .5rem; }
.contrib-label span { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.contrib-track { height: 4px; background: var(--border); margin-bottom: .8rem; }
.contrib-fill { height: 100%; }
.members-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem; padding: 0 1rem .8rem; }
.member-pill {
  display: flex; align-items: center; gap: .5rem; padding: .5rem .7rem;
  background: rgba(255,255,255,.02); border: 1px solid var(--border);
}
.member-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 9px; font-weight: 700; flex-shrink: 0; }
.member-name { font-size: .75rem; }
.member-km { font-family: var(--mono); font-size: .7rem; color: var(--muted); margin-left: auto; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100;
  background: var(--c0); color: #000; font-family: var(--mono);
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  padding: .9rem 1.4rem; text-decoration: none;
  border: none; cursor: pointer;
  box-shadow: 0 0 30px rgba(232,255,71,.4);
  transition: all .2s; display: flex; align-items: center; gap: .5rem;
}
.fab:hover { background: #fff; box-shadow: 0 0 40px rgba(255,255,255,.3); }
.fab-dot { width: 6px; height: 6px; background: #000; border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── REGISTER MODAL ── */
.modal-wrap {
  position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal-wrap.hidden { display: none; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  max-width: 400px; width: 100%; padding: 1.5rem;
}
.modal h2 { font-family: var(--mono); font-size: 1rem; margin-bottom: 1rem; }
.form-group { margin-bottom: .8rem; }
.form-group label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; display: block; margin-bottom: .3rem; }
.form-group input, .form-group select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--sans); font-size: .85rem;
  padding: .6rem .8rem; outline: none;
}
.form-group input:focus, .form-group select:focus { border-color: var(--c0); }
.form-group select option { background: #111; }
.team-choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
.team-choice {
  padding: .7rem; border: 1px solid var(--border); cursor: pointer;
  text-align: center; transition: all .2s;
}
.team-choice.selected { border-color: var(--text); background: rgba(255,255,255,.05); }
.team-choice .tc-name { font-size: .8rem; font-weight: 500; }
.team-choice .tc-dot { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto .4rem; }
.form-btn {
  width: 100%; background: var(--c0); color: #000; font-family: var(--mono);
  font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: .8rem;
  border: none; cursor: pointer; margin-top: .5rem; transition: all .2s;
}
.form-btn:hover { background: #fff; }
.modal-toggle { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: center; margin-top: .8rem; cursor: pointer; }
.modal-toggle:hover { color: var(--text); }
.form-error { font-family: var(--mono); font-size: 10px; color: var(--c2); margin-top: .5rem; min-height: 14px; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid">
    <div>
      <div class="campaign-tag">런푸마팸 5기 · 6주 챌린지</div>
      <div class="hero-title">
        <div class="glitch" data-text="RUN TO">RUN TO</div><br>
        <div class="glitch" data-text="COMPLETE">COMPLETE</div><br>
        <div class="glitch" data-text="SEOUL">SEOUL</div>
      </div>
    </div>
    <div class="dday-badge">캠페인 목표<br><span id="dday">2026km</span></div>
  </div>
  <div class="user-bar">
    <div class="user-chip" id="userChip" style="border-color:var(--border);color:var(--muted)">로그인 필요</div>
    <div class="nav-links">
      <a href="javascript:void(0)" onclick="APP.setData('currentUser', null); location.reload();">LOGOUT</a>
      <a href="history.html">MY LOG</a>
      <a href="admin.html">ADMIN</a>
    </div>
  </div>
</div>

<div class="main">

  <div class="seoul-section">
    <div class="section-label">
      <span>SEOUL UNLOCK</span>
      <span class="pct" id="unlockPct">0%</span>
    </div>
    <div class="seoul-canvas">
      <svg class="seoul-svg" id="seoulSvg" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glitch">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" id="turbulence">
              <animate attributeName="baseFrequency" dur="2s" values="0.65;0.7;0.65" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="4" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
        <rect width="700" height="200" fill="#0a0a0a"/>
        <g stroke="#1a1a1a" stroke-width=".5">
          <line x1="0" y1="50" x2="700" y2="50"/><line x1="0" y1="100" x2="700" y2="100"/>
          <line x1="0" y1="150" x2="700" y2="150"/>
          <line x1="100" y1="0" x2="100" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
          <line x1="300" y1="0" x2="300" y2="200"/><line x1="400" y1="0" x2="400" y2="200"/>
          <line x1="500" y1="0" x2="500" y2="200"/><line x1="600" y1="0" x2="600" y2="200"/>
        </g>
        <g id="fillArea0"><rect x="0"   y="0" width="175" height="200" fill="#E8FF47" opacity="0"/></g>
        <g id="fillArea1"><rect x="175" y="0" width="175" height="200" fill="#47FFD4" opacity="0"/></g>
        <g id="fillArea2"><rect x="350" y="0" width="175" height="200" fill="#FF6B47" opacity="0"/></g>
        <g id="fillArea3"><rect x="525" y="0" width="175" height="200" fill="#C447FF" opacity="0"/></g>
        <text id="seoulText" x="350" y="130" text-anchor="middle" font-family="'Space Mono',monospace" font-size="96" font-weight="700" fill="#ffffff" opacity="0.06" filter="url(#glitch)">SEOUL</text>
      </svg>
    </div>
    <div class="landmark-strip" id="landmarkStrip"></div>
  </div>

  <div class="progress-row" id="progressRow"></div>

  <div class="section-label" style="border:1px solid var(--border);border-bottom:none;padding:.6rem 1rem;margin-bottom:0">
    <span>TEAM RANKING</span>
    <span style="font-size:8px;color:var(--muted)">승인 기록 기준</span>
  </div>
  <div class="rank-section" id="rankSection"></div>

  <div class="mission-section">
    <div class="mission-header">
      <span class="section-label" style="border:none;padding:0">WEEKLY MISSION</span>
      <span class="mission-week" id="weekLabel">WEEK 1</span>
    </div>
    <div class="mission-body" id="missionBody"></div>
  </div>

  <div class="my-team-section" id="myTeamSection">
    <div class="section-label" style="border-bottom:1px solid var(--border)">
      <span>MY TEAM</span>
      <span id="myTeamName" style="font-size:10px"></span>
    </div>
    <div class="contrib-bar-wrap" id="contribBar"></div>
    <div class="members-grid" id="membersGrid"></div>
  </div>

</div>

<a class="fab" href="submit.html">
  <div class="fab-dot"></div>
  기록 제출
</a>

<div class="modal-wrap" id="modalWrap">
  <div class="modal">
    <h2 id="modalTitle">REGISTER</h2>
    <div id="registerForm">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="regName" placeholder="홍길동">
      </div>
      <div class="form-group">
        <label>연락처 뒤 4자리</label>
        <input type="text" id="regPhone" maxlength="4" placeholder="1234">
      </div>
      <div class="form-group">
        <label>팀 선택</label>
        <div class="team-choice-grid" id="teamChoiceGrid"></div>
      </div>
      <div class="form-error" id="regError"></div>
      <button class="form-btn" onclick="doRegister()">참가 등록</button>
      <div class="modal-toggle" onclick="toggleModal()">이미 등록했어요 → 로그인</div>
    </div>
    <div id="loginForm" style="display:none">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="logName" placeholder="홍길동">
      </div>
      <div class="form-group">
        <label>연락처 뒤 4자리</label>
        <input type="text" id="logPhone" maxlength="4" placeholder="1234">
      </div>
      <div class="form-error" id="logError"></div>
      <button class="form-btn" onclick="doLogin()">확인</button>
      <div class="modal-toggle" onclick="toggleModal()">← 신규 등록</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
// 1. app.js 로딩 및 에러 체크
if (typeof APP === 'undefined') {
  console.error("app.js 파일을 찾지 못했거나 오류가 있습니다.");
} else {
  APP.init();
}

let selectedTeamId = null;
let isLoginMode = false;

function toggleModal() {
  isLoginMode = !isLoginMode;
  document.getElementById('modalTitle').textContent = isLoginMode ? 'LOGIN' : 'REGISTER';
  document.getElementById('registerForm').style.display = isLoginMode ? 'none' : 'block';
  document.getElementById('loginForm').style.display   = isLoginMode ? 'block' : 'none';
}

function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  if (!name || !phone || phone.length < 4) { document.getElementById('regError').textContent = '이름과 연락처 4자리를 입력해주세요.'; return; }
  if (selectedTeamId === null) { document.getElementById('regError').textContent = '팀을 선택해주세요.'; return; }
  const r = APP.registerUser(name, phone, selectedTeamId);
  if (!r.ok) { document.getElementById('regError').textContent = r.msg; return; }
  document.getElementById('modalWrap').classList.add('hidden');
  renderAll();
}

function doLogin() {
  const name = document.getElementById('logName').value.trim();
  const phone = document.getElementById('logPhone').value.trim();
  const r = APP.loginUser(name, phone);
  if (!r.ok) { document.getElementById('logError').textContent = r.msg; return; }
  document.getElementById('modalWrap').classList.add('hidden');
  renderAll();
}

function buildTeamChoices() {
  const grid = document.getElementById('teamChoiceGrid');
  if (!grid) return;
  grid.innerHTML = APP.TEAMS.map(t =>
    `<div class="team-choice" onclick="selectTeam(${t.id})" id="tc${t.id}">
      <div class="tc-dot" style="background:${t.color}"></div>
      <div class="tc-name">${t.name}</div>
    </div>`
  ).join('');
}

function selectTeam(id) {
  selectedTeamId = id;
  APP.TEAMS.forEach(t => {
    const el = document.getElementById('tc'+t.id);
    if(el) el.classList.remove('selected');
  });
  const target = document.getElementById('tc'+id);
  if(target) target.classList.add('selected');
}

function renderAll() {
  if (typeof APP === 'undefined') return; // 에러 방지
  
  const user = APP.getCurrentUser();
  const modal = document.getElementById('modalWrap');

  if (!user) {
    modal.classList.remove('hidden');
    buildTeamChoices();
    return;
  }
  
  modal.classList.add('hidden');

  const team = APP.TEAMS[user.teamId];
  const chip = document.getElementById('userChip');
  chip.textContent = `${user.name} · ${team.name}`;
  chip.style.borderColor = team.color;
  chip.style.color = team.color;

  renderSeoul();
  renderProgress();
  renderRanking();
  renderMission();
  renderMyTeam(user);
}

function renderSeoul() {
  const totalKm = APP.getTotalKm();
  const pct = Math.min(100, (totalKm / APP.GOAL_KM) * 100);
  document.getElementById('unlockPct').textContent = pct.toFixed(1) + '%';

  const scores = APP.getTeamScores();
  const totalScore = scores.reduce((s,t) => s + t.totalKm, 0) || 1;
  scores.forEach(t => {
    const el = document.getElementById('fillArea' + t.id);
    if (!el) return;
    const ratio = t.totalKm / totalScore;
    el.querySelector('rect').setAttribute('opacity', (ratio * 0.25).toFixed(3));
  });

  const textEl = document.getElementById('seoulText');
  const cleanOpacity = Math.min(0.9, 0.06 + pct / 100 * 0.84);
  textEl.setAttribute('opacity', cleanOpacity.toFixed(2));

  // Landmarks
  const strip = document.getElementById('landmarkStrip');
  strip.innerHTML = APP.LANDMARKS.map(lm => {
    const unlocked = totalKm >= lm.km;
    return `<div class="lm-item ${unlocked ? 'unlocked' : ''}">
      <div class="lm-icon">${lm.icon}</div>
      <div class="lm-name">${lm.name}</div>
      <div class="lm-km">${lm.km.toLocaleString()}km</div>
    </div>`;
  }).join('');
}

function renderProgress() {
  const totalKm = APP.getTotalKm();
  const stats = APP.getTeamStats();
  const pct = ((totalKm / APP.GOAL_KM) * 100).toFixed(1);
  document.getElementById('progressRow').innerHTML = `
    <div class="prog-block">
      <div class="prog-label">TOTAL KM</div>
      <div class="prog-value" style="color:var(--c0)">${totalKm.toFixed(1)}</div>
      <div class="prog-sub">/ 2,026 km goal</div>
    </div>
    <div class="prog-block">
      <div class="prog-label">UNLOCK</div>
      <div class="prog-value" style="color:var(--c1)">${pct}%</div>
      <div class="prog-sub">서울 해금률</div>
    </div>
    <div class="prog-block">
      <div class="prog-label">RUNNERS</div>
      <div class="prog-value" style="color:var(--c3)">${APP.getUsers().length}</div>
      <div class="prog-sub">참가자</div>
    </div>`;
}

function renderRanking() {
  const scores = APP.getTeamScores();
  const maxScore = scores[0]?.total || 1;
  document.getElementById('rankSection').innerHTML = scores.map((t, i) => `
    <div class="rank-item">
      <div class="rank-num ${i===0?'top':''}">0${i+1}</div>
      <div class="rank-name"><span class="rank-dot" style="background:${t.color}"></span>${t.name}</div>
      <div class="rank-km">${t.totalKm.toFixed(1)}km</div>
      <div class="rank-score" style="color:${t.color}">${t.total.toFixed(1)}</div>
      <div class="score-bar-wrap">
        <div class="score-bar" style="width:${(t.total/maxScore*100).toFixed(1)}%;background:${t.color}"></div>
      </div>
    </div>`).join('');
}

function renderMission() {
  const week = APP.getCurrentWeek();
  const mission = APP.WEEKLY_MISSIONS[week - 1];
  document.getElementById('weekLabel').textContent = `WEEK ${week}`;
  const stats = APP.getTeamStats();
  const totalKm = APP.getTotalKm();
  const done1 = totalKm >= (week * 50);
  const done2 = stats.some(t => t.totalKm >= (week * 30));
  document.getElementById('missionBody').innerHTML = `
    <div class="mission-row">
      <div class="m-check ${done1?'done'}">✓</div>
      <div class="m-text ${done1?'done'}">${mission.m1}</div>
    </div>
    <div class="mission-row">
      <div class="m-check ${done2?'done'}">✓</div>
      <div class="m-text ${done2?'done'}">${mission.m2}</div>
    </div>
    ${mission.bonus ? `<div class="mission-row">
      <div class="m-check" style="border-color:var(--c3);color:var(--c3)">★</div>
      <div class="m-text" style="color:var(--muted)">보너스: ${mission.bonus}</div>
    </div>` : ''}`;
}

function renderMyTeam(user) {
  const team = APP.TEAMS[user.teamId];
  const stats = APP.getTeamStats().find(t => t.id === user.teamId);
  const allUsers = APP.getUsers().filter(u => u.teamId === user.teamId);
  const approved = APP.getApprovedRecords();
  document.getElementById('myTeamName').textContent = team.name;
  document.getElementById('myTeamName').style.color = team.color;

  const totalTeamKm = stats?.totalKm || 0;
  const contribPct = ((totalTeamKm / APP.GOAL_KM) * 100).toFixed(1);
  document.getElementById('contribBar').innerHTML = `
    <div class="contrib-label">
      <span>팀 기여 거리</span>
      <span style="color:${team.color}">${totalTeamKm.toFixed(1)}km</span>
    </div>
    <div class="contrib-track">
      <div class="contrib-fill" style="width:${contribPct}%;background:${team.color}"></div>
    </div>`;

  document.getElementById('membersGrid').innerHTML = allUsers.map(u => {
    const km = approved.filter(r => r.userId === u.id).reduce((s,r) => s+r.km, 0);
    const initials = u.name.slice(0,1);
    return `<div class="member-pill">
      <div class="member-avatar" style="background:${team.color}22;color:${team.color}">${initials}</div>
      <div class="member-name">${u.name}</div>
      <div class="member-km">${km.toFixed(1)}km</div>
    </div>`;
  }).join('');
}

// 초기 화면 렌더링
renderAll();
</script>
</body>
</html>
