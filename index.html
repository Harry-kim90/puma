<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUN PUMA FAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: rgba(15, 15, 15, 0.75); 
  --border: rgba(255, 255, 255, 0.15);
  --text: #f0f0f0;
  --muted: #999;
  --c0: #E8FF47;
  --c1: #47FFD4;
  --c2: #FF6B47;
  --c3: #C447FF;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── GLOBAL BACKGROUND ── */
body { 
  min-height: 100vh; 
  overflow-x: hidden; 
  background-color: var(--bg);
  background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('global-bg.jpg'); 
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: var(--text); 
  font-family: var(--sans); 
}

/* ── GLITCH HEADER ── */
.hero {
  position: relative;
  padding: 3rem 1.5rem 2rem;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
  background-image: url('main-bg.jpg');
  background-size: cover;
  background-position: center;
}
.hero-bg {
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.012) 2px, rgba(255,255,255,.012) 4px),
    rgba(0, 0, 0, 0.58);
  pointer-events: none;
}
.hero-grid {
  display: flex; justify-content: space-between; align-items: flex-start;
  max-width: 900px; margin: 0 auto;
}
.campaign-tag {
  font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
  color: #fff; text-transform: uppercase; margin-bottom: .6rem;
}
.hero-title {
  font-family: var(--mono); font-size: clamp(1.6rem, 6vw, 2.8rem);
  font-weight: 700; line-height: 1.1; letter-spacing: -1px;
  position: relative;
}
.hero-title .glitch {
  position: relative; display: inline-block;
  animation: glitch-flicker 4s infinite;
}
.hero-title .glitch::before,
.hero-title .glitch::after {
  content: attr(data-text); position: absolute; inset: 0;
  clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
}
.hero-title .glitch::before { color: var(--c2); animation: glitch-a 3s infinite; transform: translateX(-2px); }
.hero-title .glitch::after  { color: var(--c1); clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%); animation: glitch-b 3s infinite; transform: translateX(2px); }
@keyframes glitch-a { 0%,90%,100%{opacity:0} 91%,95%{opacity:.8} }
@keyframes glitch-b { 0%,85%,100%{opacity:0} 86%,92%{opacity:.8} }
@keyframes glitch-flicker { 0%,98%,100%{opacity:1} 99%{opacity:.85} }

.dday-badge {
  font-family: var(--mono); font-size: 11px;
  border: 1px solid rgba(255,255,255,0.3); padding: .4rem .8rem;
  color: #fff; white-space: nowrap; margin-top: .4rem;
  background: rgba(0,0,0,0.4);
}
.dday-badge span { color: var(--text); }

/* ── USER BAR ── */
.user-bar {
  max-width: 900px; margin: 1.2rem auto 0;
  display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
  position: relative; z-index: 10;
}
.user-chip {
  font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
  padding: .3rem .8rem; border: 1px solid; border-radius: 2px;
  background: rgba(0,0,0,0.6);
}
.nav-links { display: flex; gap: .5rem; margin-left: auto; }
.nav-links a {
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
  color: #fff; text-decoration: none; padding: .3rem .6rem;
  border: 1px solid rgba(255,255,255,0.3); transition: all .2s;
  background: rgba(0,0,0,0.6);
}
.nav-links a:hover { color: var(--c0); border-color: var(--c0); }

/* ── MAIN LAYOUT ── */
.main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 6rem; }

/* ── TEAM PROGRESS UNLOCK (육상 트랙) ── */
.team-unlock-section {
  border: 1px solid var(--border); margin-bottom: 1.5rem; position: relative; overflow: hidden;
  background: var(--surface); backdrop-filter: blur(8px);
  max-width: 500px; margin: 0 auto 1.5rem;
}
.section-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 3px;
  color: var(--muted); padding: .8rem 1.2rem; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(0,0,0,0.4);
}
.section-label .pct { color: var(--c0); }

.medal-canvas {
  position: relative; width: 100%; height: 400px; background: #000; overflow: hidden;
}

/* 4개 convergent(수렴형) 육상 트랙 */
.medal-canvas::before {
  content: ''; position: absolute; inset: 0;
  background:
    conic-gradient(at 50% 50%,
      var(--bg) 0% 12.5%,
      var(--c0) 12.5% 25%, /* HA */
      var(--bg) 25% 37.5%,
      var(--c2) 37.5% 50%, /* CA */
      var(--bg) 50% 62.5%,
      var(--c1) 62.5% 75%, /* HB */
      var(--bg) 75% 87.5%,
      var(--c3) 87.5% 100% /* DA */
    );
  opacity: 0.15; z-index: 0;
}

.seoul-bg-layer {
  position: absolute; inset: 0; width: 100%; height: 100%;
  background-image: url('seoul-bg.jpg');
  background-size: cover;
  background-position: center;
}
.seoul-img-base { filter: grayscale(1) brightness(0.35); z-index: 1; }
.seoul-img-fill { filter: none; z-index: 2; clip-path: inset(0 100% 0 0); transition: clip-path 1s cubic-bezier(0.2, 0.8, 0.2, 1); }

.medal-img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center;
  filter: grayscale(1) brightness(0.6);
  transition: filter .6s ease;
  z-index: 3;
}
.medal-canvas:hover .medal-img { filter: none; }

/* 출발선 및 사람 아이콘 */
.team-runner {
  position: absolute; font-size: 16px; 
  filter: drop-shadow(0 0 4px rgba(0,0,0,0.5)); pointer-events: none;
  transition: top .6s ease, bottom .6s ease, left .6s ease, right .6s ease;
  z-index: 4;
}
.runner-ha { color: var(--c0); top: 10%; left: 10%; }
.runner-hb { color: var(--c1); top: 10%; right: 10%; }
.runner-ca { color: var(--c2); bottom: 10%; left: 10%; }
.runner-da { color: var(--c3); bottom: 10%; right: 10%; }

.team-label {
  position: absolute; font-family: var(--mono); font-size: 8px; color: #000;
  padding: .2rem .4rem; background: rgba(255,255,255,0.7);
  text-align: center; white-space: nowrap; pointer-events: none;
  opacity: 0.8; z-index: 5;
}
.ha-label { left: 5px; top: 5px; }
.hb-label { right: 5px; top: 5px; }
.ca-label { left: 5px; bottom: 5px; }
.da-label { right: 5px; bottom: 5px; }

.seoul-canvas::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.3) 3px, rgba(0,0,0,.3) 4px);
  z-index: 6;
}

/* ── DASHBOARD STATS ── */
.dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
.prog-block { border: 1px solid var(--border); padding: 1rem; background: var(--surface); backdrop-filter: blur(8px); }
.prog-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-bottom: .5rem; }
.prog-value { font-family: var(--mono); font-size: 1.4rem; font-weight: 700; }
.prog-sub   { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: .3rem; }

/* ── RANKINGS ── */
.ranking-container { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
@media (max-width: 700px) { .ranking-container { grid-template-columns: 1fr; } }
.rank-card { border: 1px solid var(--border); background: var(--surface); backdrop-filter: blur(8px); }
.rank-list { padding: 0; }
.rank-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s; }
.rank-item:last-child { border-bottom: none; }
.rank-item:hover { background: rgba(255,255,255,0.03); }
.rank-pos { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--muted); min-width: 1.5rem; }
.rank-pos.top { color: var(--c0); }
.rank-info { flex: 1; }
.rank-name-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.2rem; }
.rank-name { font-size: 0.9rem; font-weight: 600; }
.rank-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: .4rem; }
.rank-team-tag { font-family: var(--mono); font-size: 8px; padding: 2px 5px; border: 1px solid; border-radius: 2px; }
.rank-val-box { text-align: right; }
.rank-km { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; }
.rank-score { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 2px; }
.score-bar-wrap { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: .6rem; }
.score-bar { height: 100%; transition: width .8s ease; }

/* ── MISSION CARD ── */
.mission-section { border: 1px solid var(--border); margin-bottom: 2rem; background: var(--surface); backdrop-filter: blur(8px); }
.mission-header { padding: .8rem 1.2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); }
.mission-week { font-family: var(--mono); font-size: 11px; color: var(--c0); }
.mission-body { padding: 1rem 1.2rem; display: flex; flex-direction: column; gap: .8rem; }
.mission-row { display: flex; align-items: center; gap: .8rem; }
.m-check { width: 22px; height: 22px; border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.3s ease; }
.m-check.done { border-color: var(--c1); color: var(--c1); background: rgba(71,255,212,0.1); }
.m-text { font-size: 0.95rem; color: var(--muted); font-weight: 400; transition: color 0.3s ease;}
.m-text.done { color: var(--text); font-weight: 500;}

/* ── MY TEAM ── */
.my-team-section { border: 1px solid var(--border); margin-bottom: 1.5rem; display: none; background: var(--surface); backdrop-filter: blur(8px); }
.contrib-bar-wrap { padding: .8rem 1.2rem; }
.contrib-label { display: flex; justify-content: space-between; margin-bottom: .5rem; }
.contrib-label span { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.contrib-track { height: 4px; background: rgba(255,255,255,0.1); margin-bottom: .8rem; }
.contrib-fill { height: 100%; }
.members-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; padding: 0 1.2rem 1rem; }
.member-pill { display: flex; align-items: center; gap: .6rem; padding: .6rem .8rem; background: rgba(0,0,0,0.3); border: 1px solid var(--border); }
.member-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 10px; font-weight: 700; flex-shrink: 0; }
.member-name { font-size: .8rem; }
.member-km { font-family: var(--mono); font-size: .8rem; color: var(--muted); margin-left: auto; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100;
  background: var(--c0); color: #000; font-family: var(--mono);
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  padding: .9rem 1.4rem; text-decoration: none; border: none; cursor: pointer;
  box-shadow: 0 0 30px rgba(232,255,71,.4); transition: all .2s; display: flex; align-items: center; gap: .5rem;
}
.fab:hover { background: #fff; box-shadow: 0 0 40px rgba(255,255,255,.3); }
.fab-dot { width: 6px; height: 6px; background: #000; border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── MODAL ── */
.modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.modal-wrap.hidden { display: none; }
.modal { background: #111; border: 1px solid var(--border); max-width: 400px; width: 100%; padding: 1.5rem; }
.modal h2 { font-family: var(--mono); font-size: 1rem; margin-bottom: 1.2rem; }
.form-group { margin-bottom: 1rem; }
.form-group label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; display: block; margin-bottom: .4rem; }
.form-group input { width: 100%; background: #0a0a0a; border: 1px solid var(--border); color: #fff; padding: .7rem; outline: none; }
.team-choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
.team-choice { padding: .7rem; border: 1px solid var(--border); cursor: pointer; text-align: center; transition: all 0.2s; }
.team-choice.selected { border-color: var(--c0); background: rgba(232,255,71,.05); }
.form-btn { width: 100%; background: var(--c0); color: #000; font-family: var(--mono); font-size: 11px; font-weight: 700; padding: .9rem; border: none; cursor: pointer; margin-top: 1rem; transition: background 0.2s; }
.form-btn:hover { background: #fff; }
.modal-toggle { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: center; margin-top: 1rem; cursor: pointer; }
.modal-toggle:hover { color: #fff; }
.form-error { font-family: var(--mono); font-size: 10px; color: var(--c2); margin-top: .5rem; min-height: 14px; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid">
    <div>
      <div class="campaign-tag">런푸마팸 5기 · 6주 챌린지</div>
      <div class="hero-title">
        <div class="glitch" data-text="RUN">RUN</div><br>
        <div class="glitch" data-text="PUMA">PUMA</div><br>
        <div class="glitch" data-text="FAM">FAM</div>
      </div>
    </div>
    <div class="dday-badge">캠페인 목표<br><span id="dday">팀별 목표</span></div>
  </div>
  <div class="user-bar">
    <div class="user-chip" id="userChip" style="border-color:var(--border);color:var(--muted)">로그인 필요</div>
    <div class="nav-links">
      <a href="javascript:void(0)" onclick="if(typeof APP !== 'undefined'){ APP.setData('currentUser', null); location.reload(); }">LOGOUT</a>
      <a href="history.html">MY LOG</a>
    </div>
  </div>
</div>

<div class="main">
  <div class="team-unlock-section">
    <div class="section-label">
      <span>TEAM PROGRESS UNLOCK</span>
      <span class="pct"></span>
    </div>
    <div class="medal-canvas" id="seoulCanvas">
      <img src="medal.png" alt="Seoul Race Medal" class="medal-img">
      
      <div class="team-runner runner-ha" id="haRunner">🏃</div>
      <div class="team-runner runner-hb" id="hbRunner">🏃</div>
      <div class="team-runner runner-ca" id="caRunner">🏃</div>
      <div class="team-runner runner-da" id="daRunner">🏃</div>

      <div class="team-label ha-label">HALF A팀<br><span id="haPct">0%</span></div>
      <div class="team-label hb-label">HALF B팀<br><span id="hbPct">0%</span></div>
      <div class="team-label ca-label">10KM C팀<br><span id="caPct">0%</span></div>
      <div class="team-label da-label">10KM D팀<br><span id="daPct">0%</span></div>
    </div>
  </div>

  <div class="dashboard-grid" id="progressRow"></div>

  <div class="ranking-container">
    <div class="rank-card">
      <div class="section-label">
        <span>TEAM RANKING</span>
        <span style="font-size:8px;color:var(--muted)">종합 점수 기준</span>
      </div>
      <div class="rank-list" id="rankSection"></div>
    </div>

    <div class="rank-card">
      <div class="section-label">
        <span>INDIVIDUAL TOP 10</span>
        <span style="font-size:8px;color:var(--c0)">개인 누적 거리</span>
      </div>
      <div class="rank-list" id="individualRankSection"></div>
    </div>
  </div>

  <div class="mission-section">
    <div class="mission-header">
      <span class="section-label" style="border:none;padding:0;background:none;">WEEKLY MISSION</span>
      <span class="mission-week" id="weekLabel">WEEK 1</span>
    </div>
    <div class="mission-body" id="missionBody"></div>
  </div>

  <div class="my-team-section" id="myTeamSection">
    <div class="section-label">
      <span>MY TEAM</span>
      <span id="myTeamName" style="font-size:10px"></span>
    </div>
    <div class="contrib-bar-wrap" id="contribBar"></div>
    <div class="members-grid" id="membersGrid"></div>
  </div>
</div>

<a class="fab" href="submit.html">
  <div class="fab-dot"></div>
  기록 제출
</a>

<div class="modal-wrap hidden" id="modalWrap">
  <div class="modal">
    <h2 id="modalTitle">REGISTER</h2>
    <div id="registerForm">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="regName" placeholder="홍길동">
      </div>
      <div class="form-group">
        <label>연락처 뒤 4자리</label>
        <input type="text" id="regPhone" maxlength="4" placeholder="1234">
      </div>
      <div class="form-group">
        <label>팀 선택</label>
        <div class="team-choice-grid" id="teamChoiceGrid"></div>
      </div>
      <div class="form-error" id="regError" style="color:var(--c2); font-size:10px; margin-top:5px;"></div>
      <button class="form-btn" onclick="doRegister()">참가 등록</button>
      <div class="modal-toggle" onclick="toggleModal()">이미 등록했어요 → 로그인</div>
    </div>
    <div id="loginForm" style="display:none">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="logName" placeholder="홍길동">
      </div>
      <div class="form-group">
        <label>연락처 뒤 4자리</label>
        <input type="text" id="logPhone" maxlength="4" placeholder="1234">
      </div>
      <div class="form-error" id="logError" style="color:var(--c2); font-size:10px; margin-top:5px;"></div>
      <button class="form-btn" onclick="doLogin()">확인</button>
      <div class="modal-toggle" onclick="toggleModal()">← 신규 등록</div>
    </div>
  </div>
</div>

<script>
// ─── 주차별 미션 데이터 (시간 기반으로 수정됨) ───────────────────────────────
const APP_LOGIC = `
  const APP = {
    GOAL_KM: 2026,
    MAX_DAILY_KM: 50,
    TEAMS: [
      { id: 0, name: "HALF A팀", color: "#E8FF47", bg: "#1a1a0d", abbr: "HA" },
      { id: 1, name: "HALF B팀", color: "#47FFD4", bg: "#0d1a17", abbr: "HB" },
      { id: 2, name: "10KM C팀", color: "#FF6B47", bg: "#1a0f0d", abbr: "CA" },
      { id: 3, name: "10KM D팀", color: "#C447FF", bg: "#150d1a", abbr: "DA" },
    ],
    LANDMARKS: [],
    
    // 수정된 주차별 미션
    WEEKLY_MISSIONS: [
      { week: 1, desc: "조깅 10km" },
      { week: 2, desc: "80분 조깅" },
      { week: 3, desc: "지속주 10km" },
      { week: 4, desc: "100분 조깅" },
      { week: 5, desc: "거리주 15km" },
      { week: 6, desc: "5km 기록회" }
    ],

    getData(key, fallback) { try { const v = localStorage.getItem("rtcs_" + key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
    setData(key, val) { try { localStorage.setItem("rtcs_" + key, JSON.stringify(val)); } catch {} },
    init() { if (!this.getData("seeded", false)) { this.seedDemo(); this.setData("seeded", true); } },
    seedDemo() { this.setData("users", []); this.setData("records", []); this.setData("currentUser", null); },
    getUsers() { return this.getData("users", []); },
    getRecords() { return this.getData("records", []); },
    getCurrentUserId() { return this.getData("currentUser", null); },
    getCurrentUser() { const id = this.getCurrentUserId(); return this.getUsers().find(u => u.id === id) || null; },
    getApprovedRecords() { return this.getRecords().filter(r => r.status === "approved"); },
    getTeamStats() {
      const users = this.getUsers(); const approved = this.getApprovedRecords();
      return this.TEAMS.map(team => {
        const members = users.filter(u => u.teamId === team.id);
        const memberIds = members.map(u => u.id);
        const records = approved.filter(r => memberIds.includes(r.userId));
        const totalKm = records.reduce((s, r) => s + r.km, 0);
        const participantCount = new Set(records.map(r => r.userId)).size;
        return { ...team, totalKm: Math.round(totalKm * 10) / 10, memberCount: members.length, participantCount, recordCount: records.length };
      });
    },
    getTeamScores() {
      const stats = this.getTeamStats(); const totalKm = stats.reduce((s, t) => s + t.totalKm, 0) || 1;
      return stats.map(t => {
        const distScore = Math.round((t.totalKm / totalKm) * 50 * 10) / 10;
        const partRate = t.memberCount > 0 ? t.participantCount / t.memberCount : 0;
        const partScore = Math.round(partRate * 20 * 10) / 10;
        const missionScore = t.totalKm >= 50 ? 20 : Math.round((t.totalKm / 50) * 20 * 10) / 10;
        const bonusScore = (t.memberCount > 0 && t.participantCount >= t.memberCount) ? 10 : 0;
        const total = Math.round((distScore + partScore + missionScore + bonusScore) * 10) / 10;
        return { ...t, distScore, partScore, missionScore, bonusScore, total };
      }).sort((a, b) => b.total - a.total);
    },
    getTotalKm() { return Math.round(this.getApprovedRecords().reduce((s, r) => s + r.km, 0) * 10) / 10; },
    getUserRecords(userId) { return this.getRecords().filter(r => r.userId === userId).sort((a, b) => b.submittedAt.localeCompare(a.submittedAt)); },
    registerUser(name, phone, teamId) {
      const users = this.getUsers();
      if (users.find(u => u.name === name && u.phone === phone.slice(-4))) return { ok: false, msg: "이미 등록된 참가자입니다." };
      const id = "u" + Date.now();
      const user = { id, name, phone: phone.slice(-4), teamId: parseInt(teamId), joinDate: new Date().toISOString().slice(0,10) };
      users.push(user); this.setData("users", users); this.setData("currentUser", id); return { ok: true, user };
    },
    loginUser(name, phone) {
      const users = this.getUsers();
      const user = users.find(u => u.name === name && u.phone === phone.slice(-4));
      if (!user) return { ok: false, msg: "이름 또는 연락처가 일치하지 않아요." };
      this.setData("currentUser", user.id); return { ok: true, user };
    },
    getCurrentWeek() {
      const start = new Date("2026-03-02");
      const now = new Date();
      return Math.min(6, Math.max(1, Math.ceil((now - start) / (7 * 86400000))));
    }
  };
`;

// 동적으로 APP 객체 주입 (이전 app.js와 충돌 방지)
const scriptEl = document.createElement('script');
scriptEl.textContent = APP_LOGIC;
document.head.appendChild(scriptEl);
</script>

<script>
let selectedTeamId = null;
let isLoginMode = false;

function toggleModal() {
  isLoginMode = !isLoginMode;
  document.getElementById('modalTitle').textContent = isLoginMode ? 'LOGIN' : 'REGISTER';
  document.getElementById('registerForm').style.display = isLoginMode ? 'none' : 'block';
  document.getElementById('loginForm').style.display   = isLoginMode ? 'block' : 'none';
}

function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  if (!name || !phone || phone.length < 4) { document.getElementById('regError').textContent = '이름과 연락처 4자리를 입력해주세요.'; return; }
  if (selectedTeamId === null) { document.getElementById('regError').textContent = '팀을 선택해주세요.'; return; }
  const r = APP.registerUser(name, phone, selectedTeamId);
  if (!r.ok) { document.getElementById('regError').textContent = r.msg; return; }
  document.getElementById('modalWrap').classList.add('hidden');
  renderAll();
}

function doLogin() {
  const name = document.getElementById('logName').value.trim();
  const phone = document.getElementById('logPhone').value.trim();
  const r = APP.loginUser(name, phone);
  if (!r.ok) { document.getElementById('logError').textContent = r.msg; return; }
  document.getElementById('modalWrap').classList.add('hidden');
  renderAll();
}

function buildTeamChoices() {
  const grid = document.getElementById('teamChoiceGrid');
  if (!grid) return;
  grid.innerHTML = APP.TEAMS.map(t =>
    `<div class="team-choice" onclick="selectTeam(${t.id})" id="tc${t.id}">
      <div class="tc-name" style="font-size:11px; font-weight:600; color:${t.color}">${t.name}</div>
    </div>`
  ).join('');
}

function selectTeam(id) {
  selectedTeamId = id;
  APP.TEAMS.forEach(t => {
    const el = document.getElementById('tc'+t.id);
    if(el) el.classList.remove('selected');
  });
  const target = document.getElementById('tc'+id);
  if(target) target.classList.add('selected');
}

function renderAll() {
  const modal = document.getElementById('modalWrap');

  APP.init();
  const user = APP.getCurrentUser();

  renderTeamUnlock();
  renderProgress();
  renderRanking();             
  renderIndividualRanking();   
  renderMission();

  if (!user) {
    modal.classList.remove('hidden');
    buildTeamChoices();
    document.getElementById('myTeamSection').style.display = 'none';
    return;
  }

  modal.classList.add('hidden');
  document.getElementById('myTeamSection').style.display = 'block';
  
  const team = APP.TEAMS[user.teamId];
  const chip = document.getElementById('userChip');
  chip.textContent = `${user.name} · ${team.name}`;
  chip.style.borderColor = team.color;
  chip.style.color = team.color;

  renderMyTeam(user);
}

function renderTeamUnlock() {
  const stats = APP.getTeamStats();
  
  stats.forEach(t => {
    const pct = Math.min(100, (t.totalKm / APP.GOAL_KM) * 100);
    const runnerEl = document.getElementById(t.abbr.toLowerCase() + 'Runner');
    const pctEl = document.getElementById(t.abbr.toLowerCase() + 'Pct');

    if (runnerEl) {
      const moveValue = (10 + (pct * (50-10) / 100)) + '%';
      if (t.abbr === 'HA') { runnerEl.style.top = moveValue; runnerEl.style.left = moveValue; }
      else if (t.abbr === 'HB') { runnerEl.style.top = moveValue; runnerEl.style.right = moveValue; }
      else if (t.abbr === 'CA') { runnerEl.style.bottom = moveValue; runnerEl.style.left = moveValue; }
      else if (t.abbr === 'DA') { runnerEl.style.bottom = moveValue; runnerEl.style.right = moveValue; }
    }
    if (pctEl) pctEl.textContent = pct.toFixed(1) + '%';
  });
}

function renderProgress() {
  const user = APP.getCurrentUser();
  let displayKm = 0;
  let label = "TOTAL DISTANCE";
  let color = "var(--text)";
  let pct = "0.0";
  
  if (user) {
    const teamStats = APP.getTeamStats().find(t => t.id === user.teamId);
    displayKm = teamStats ? teamStats.totalKm : 0;
    label = "MY TEAM DISTANCE";
    color = APP.TEAMS[user.teamId].color; 
    pct = Math.min(100, (displayKm / APP.GOAL_KM) * 100).toFixed(1);
  } else {
    displayKm = APP.getTotalKm();
    pct = Math.min(100, (displayKm / (APP.GOAL_KM * 4)) * 100).toFixed(1);
  }

  document.getElementById('progressRow').innerHTML = `
    <div class="prog-block">
      <div class="prog-label">${label}</div>
      <div class="prog-value" style="color:${color}">${displayKm.toFixed(1)}<span style="font-size:11px; margin-left:3px; color:var(--muted)">km</span></div>
      <div class="prog-sub">/ 2,026 km goal</div>
    </div>
    <div class="prog-block">
      <div class="prog-label">TEAM GOALS UNLOCK</div>
      <div class="prog-value" style="color:${color}">${pct}%</div>
      <div class="prog-sub">목표 달성률</div>
    </div>
    <div class="prog-block">
      <div class="prog-label">ACTIVE RUNNERS</div>
      <div class="prog-value" style="color:var(--c3)">${APP.getUsers().length}</div>
      <div class="prog-sub">전체 참가 인원</div>
    </div>`;
}

function renderRanking() {
  const scores = APP.getTeamScores();
  const maxScore = scores[0]?.total || 1;
  
  document.getElementById('rankSection').innerHTML = scores.map((t, i) => `
    <div class="rank-item" style="display:block;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.4rem;">
        <div style="display:flex; align-items:center; gap:0.6rem;">
          <div class="rank-pos ${i<3?'top':''}">${i+1}</div>
          <span class="rank-dot" style="background:${t.color}"></span>
          <span class="rank-name">${t.name}</span>
        </div>
        <div class="rank-val-box">
          <div class="rank-km" style="color:${t.color}">${t.totalKm.toFixed(1)}km</div>
          <div class="rank-score">SCORE: ${t.total.toFixed(1)}</div>
        </div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar" style="width:${(t.total/maxScore*100).toFixed(1)}%; background:${t.color}"></div>
      </div>
    </div>`).join('');
}

function renderIndividualRanking() {
  const users = APP.getUsers();
  const approvedRecords = APP.getApprovedRecords();
  
  const userKms = users.map(u => {
    const userKm = approvedRecords
      .filter(r => r.userId === u.id)
      .reduce((sum, r) => sum + r.km, 0);
    return { ...u, km: userKm };
  });

  const sortedUsers = userKms.sort((a, b) => b.km - a.km).slice(0, 10);
  const container = document.getElementById('individualRankSection');
  
  if (sortedUsers.length === 0 || sortedUsers[0].km === 0) {
    container.innerHTML = '<div style="padding:3rem 1rem; text-align:center; font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:1px;">아직 기록된 러닝이 없습니다.</div>';
    return;
  }

  container.innerHTML = sortedUsers.map((u, i) => {
    const team = APP.TEAMS[u.teamId];
    return `
      <div class="rank-item">
        <div class="rank-pos ${i<3?'top':''}">${i+1}</div>
        <div class="rank-info">
          <div class="rank-name-row">
            <span class="rank-name">${u.name}</span>
            <span class="rank-team-tag" style="color:${team.color}; border-color:${team.color}">${team.abbr}</span>
          </div>
        </div>
        <div class="rank-val-box">
          <div class="rank-km" style="color:var(--text)">${u.km.toFixed(1)}<span style="font-size:10px; color:var(--muted); font-weight:normal;"> km</span></div>
        </div>
      </div>`;
  }).join('');
}

function renderMission() {
  const week = APP.getCurrentWeek();
  const missionIdx = Math.min(6, Math.max(1, week)) - 1;
  const mission = APP.WEEKLY_MISSIONS[missionIdx];
  document.getElementById('weekLabel').textContent = `WEEK ${missionIdx + 1}`;

  // 이번 주에 승인된 기록이 1개라도 있는지 확인하여 미션 완료 여부 결정
  let done = false;
  const user = APP.getCurrentUser();
  if (user) {
    const start = new Date("2026-03-02");
    const currentWeekRecords = APP.getApprovedRecords().filter(r => {
        if (r.userId !== user.id) return false;
        const rDate = new Date(r.date);
        const rWeek = Math.min(6, Math.max(1, Math.ceil((rDate - start) / (7 * 86400000))));
        return rWeek === (missionIdx + 1);
    });
    done = currentWeekRecords.length > 0;
  }

  document.getElementById('missionBody').innerHTML = `
    <div class="mission-row">
      <div class="m-check ${done ? 'done' : ''}">✓</div>
      <div class="m-text ${done ? 'done' : ''}" style="font-weight: 500;">${mission.desc}</div>
    </div>
  `;
}

function renderMyTeam(user) {
  const team = APP.TEAMS[user.teamId];
  const stats = APP.getTeamStats().find(t => t.id === user.teamId);
  const allUsers = APP.getUsers().filter(u => u.teamId === user.teamId);
  const approved = APP.getApprovedRecords();
  document.getElementById('myTeamName').textContent = team.name;
  document.getElementById('myTeamName').style.color = team.color;

  const totalTeamKm = stats?.totalKm || 0;
  const contribPct = ((totalTeamKm / APP.GOAL_KM) * 100).toFixed(1);
  document.getElementById('contribBar').innerHTML = `
    <div class="contrib-label">
      <span>팀 기여 거리</span>
      <span style="color:${team.color}">${totalTeamKm.toFixed(1)}km</span>
    </div>
    <div class="contrib-track">
      <div class="contrib-fill" style="width:${contribPct}%;background:${team.color}"></div>
    </div>`;

  document.getElementById('membersGrid').innerHTML = allUsers.map(u => {
    const km = approved.filter(r => r.userId === u.id).reduce((s,r) => s+r.km, 0);
    const initials = u.name.slice(0,1);
    return `<div class="member-pill">
      <div class="member-avatar" style="background:${team.color}22;color:${team.color}">${initials}</div>
      <div class="member-name">${u.name}</div>
      <div class="member-km">${km.toFixed(1)}km</div>
    </div>`;
  }).join('');
}

renderAll();
</script>
</body>
</html>
