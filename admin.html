<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 검수 · RUN TO COMPLETE SEOUL</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --surface: #111; --border: #222; --text: #f0f0f0;
  --muted: #666; --c0: #E8FF47; --c1: #47FFD4; --c2: #FF6B47; --c3: #C447FF;
  --mono: 'Space Mono', monospace; --sans: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); font-family: var(--sans); }

/* TOPBAR */
.topbar {
  display: flex; align-items: center; gap: 1rem;
  padding: .8rem 1.2rem; border-bottom: 1px solid var(--border);
  background: var(--surface); position: sticky; top: 0; z-index: 50;
}
.back-btn { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; }
.back-btn:hover { color: var(--text); }
.topbar-title { font-family: var(--mono); font-size: 11px; letter-spacing: 3px; }
.admin-badge { margin-left: auto; background: var(--c2); color: #000; font-family: var(--mono); font-size: 9px; padding: .2rem .6rem; letter-spacing: 1px; }

/* PASSWORD GATE */
.gate {
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - 50px); padding: 2rem;
}
.gate-box { max-width: 320px; width: 100%; text-align: center; }
.gate-title { font-family: var(--mono); font-size: 1rem; margin-bottom: 1.5rem; letter-spacing: 2px; }
.gate-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 1rem;
  padding: .8rem; outline: none; text-align: center; letter-spacing: 4px; margin-bottom: .8rem;
}
.gate-input:focus { border-color: var(--c0); }
.gate-btn {
  width: 100%; background: var(--c0); color: #000; font-family: var(--mono);
  font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: .8rem; border: none; cursor: pointer;
}
.gate-error { font-family: var(--mono); font-size: 10px; color: var(--c2); margin-top: .5rem; min-height: 14px; }

/* MAIN ADMIN */
.admin-wrap { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 4rem; display: none; }

/* STATS BAR */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.5rem; }
.stat-card { border: 1px solid var(--border); padding: .8rem .9rem; }
.stat-label { font-family: var(--mono); font-size: 8px; letter-spacing: 2px; color: var(--muted); margin-bottom: .3rem; }
.stat-val { font-family: var(--mono); font-size: 1.3rem; font-weight: 700; }

/* FILTERS */
.filter-bar {
  display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center;
}
.filter-select {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 10px;
  padding: .4rem .7rem; outline: none; cursor: pointer;
}
.filter-select:focus { border-color: var(--c0); }
.filter-toggle {
  font-family: var(--mono); font-size: 10px; padding: .4rem .8rem;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  cursor: pointer; transition: all .2s; letter-spacing: 1px;
}
.filter-toggle.active { border-color: var(--c0); color: var(--c0); background: rgba(232,255,71,.05); }
.bulk-btn {
  margin-left: auto; background: var(--c1); color: #000;
  font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 1px;
  padding: .4rem 1rem; border: none; cursor: pointer; transition: all .2s;
}
.bulk-btn:hover { background: #fff; }
.danger-btn {
  background: transparent; color: var(--c2);
  font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 1px;
  padding: .4rem 1rem; border: 1px solid rgba(255,107,71,.4); cursor: pointer; transition: all .2s;
}
.danger-btn:hover { background: var(--c2); color: #000; border-color: var(--c2); }
.del-sel-btn {
  background: transparent; color: var(--muted);
  font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
  padding: .4rem 1rem; border: 1px solid var(--border); cursor: pointer; transition: all .2s;
}
.del-sel-btn:hover { border-color: var(--c2); color: var(--c2); }

/* RECORD GRID */
.record-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: .8rem; }

.record-card {
  border: 1px solid var(--border); background: var(--surface);
  transition: border-color .2s; position: relative;
}
.record-card.abnormal { border-color: rgba(255,107,71,.5); }
.record-card.selected { border-color: var(--c0); background: rgba(232,255,71,.03); }

.card-img-wrap { position: relative; height: 140px; overflow: hidden; background: #1a1a1a; cursor: pointer; }
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
.card-img-wrap:hover img { transform: scale(1.03); }
.card-flag {
  position: absolute; top: 6px; left: 6px;
  font-family: var(--mono); font-size: 8px; padding: .2rem .5rem;
  letter-spacing: 1px;
}
.flag-abnormal { background: var(--c2); color: #000; }
.flag-pending  { background: rgba(255,255,255,.15); color: var(--text); }
.flag-approved { background: rgba(71,255,212,.2); color: var(--c1); }
.flag-rejected { background: rgba(255,107,71,.2); color: var(--c2); }

.card-sel-check {
  position: absolute; top: 6px; right: 6px; width: 20px; height: 20px;
  border: 1px solid rgba(255,255,255,.3); background: rgba(0,0,0,.5);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; transition: all .2s;
}
.record-card.selected .card-sel-check { border-color: var(--c0); background: var(--c0); color: #000; }

.card-body { padding: .7rem; }
.card-user { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; }
.card-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 8px; font-weight: 700; flex-shrink: 0; }
.card-name { font-size: .8rem; font-weight: 500; }
.card-team { font-family: var(--mono); font-size: 9px; margin-left: auto; }
.card-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .6rem; }
.card-km { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; }
.card-date { font-family: var(--mono); font-size: 9px; color: var(--muted); }
.card-submitted { font-family: var(--mono); font-size: 8px; color: #444; margin-bottom: .6rem; }

.card-actions { display: flex; gap: .4rem; }
.btn-approve, .btn-reject {
  flex: 1; font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: 1px; padding: .5rem; border: none; cursor: pointer; transition: all .2s;
}
.btn-approve { background: rgba(71,255,212,.15); color: var(--c1); border: 1px solid rgba(71,255,212,.3); }
.btn-approve:hover { background: var(--c1); color: #000; }
.btn-reject  { background: rgba(255,107,71,.1);  color: var(--c2); border: 1px solid rgba(255,107,71,.2); }
.btn-reject:hover  { background: var(--c2); color: #000; }

.card-note { font-family: var(--mono); font-size: 9px; color: var(--c2); margin-top: .4rem; padding: .4rem .5rem; border: 1px solid rgba(255,107,71,.2); }

/* STATUS badge on processed cards */
.status-done {
  display: flex; align-items: center; justify-content: center;
  padding: .7rem; font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
}

/* LIGHTBOX */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 500;
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.lightbox.hidden { display: none; }
.lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; }
.lightbox-close {
  position: absolute; top: 1rem; right: 1rem;
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  cursor: pointer; background: none; border: 1px solid var(--border); padding: .4rem .8rem;
}
.lightbox-close:hover { color: var(--text); }

/* REJECT MODAL */
.reject-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 400;
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.reject-modal.hidden { display: none; }
.reject-box { background: var(--surface); border: 1px solid var(--border); max-width: 360px; width: 100%; padding: 1.5rem; }
.reject-box h3 { font-family: var(--mono); font-size: .9rem; margin-bottom: 1rem; color: var(--c2); }
.reject-box textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--sans); font-size: .85rem;
  padding: .6rem .8rem; outline: none; resize: vertical; min-height: 80px; margin-bottom: .8rem;
}
.reject-box textarea:focus { border-color: var(--c2); }
.reject-actions { display: flex; gap: .5rem; }
.rej-confirm { flex: 1; background: var(--c2); color: #000; font-family: var(--mono); font-size: 10px; font-weight: 700; padding: .6rem; border: none; cursor: pointer; }
.rej-cancel  { flex: 1; background: transparent; color: var(--muted); font-family: var(--mono); font-size: 10px; padding: .6rem; border: 1px solid var(--border); cursor: pointer; }
.rej-cancel:hover { color: var(--text); }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 3rem; font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← BACK</a>
  <div class="topbar-title">ADMIN REVIEW</div>
  <div class="admin-badge">ADMIN</div>
</div>

<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-title">ADMIN ACCESS</div>
    <input type="password" class="gate-input" id="pwInput" placeholder="••••" maxlength="4" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="gate-btn" onclick="checkPw()">ENTER</button>
    <div class="gate-error" id="pwError"></div>
    <div style="font-family:var(--mono);font-size:9px;color:#333;margin-top:1rem;">HINT: 0000</div>
  </div>
</div>

<div class="admin-wrap" id="adminWrap">

  <div class="stats-row" id="statsRow"></div>

  <div class="filter-bar">
    <select class="filter-select" id="filterStatus" onchange="renderCards()">
      <option value="all">전체 상태</option>
      <option value="pending" selected>검수 대기</option>
      <option value="approved">승인 완료</option>
      <option value="rejected">반려</option>
    </select>
    <select class="filter-select" id="filterTeam" onchange="renderCards()">
      <option value="all">전체 팀</option>
      <option value="0">HALF A팀</option>
      <option value="1">HALF B팀</option>
      <option value="2">10KM C팀</option>
      <option value="3">10KM D팀</option>
    </select>
    <button class="filter-toggle" id="flagToggle" onclick="toggleFlag()">⚠ 비정상만</button>
    <button class="bulk-btn" onclick="bulkApprove()">선택 일괄 승인</button>
    <button class="del-sel-btn" onclick="deleteSelected()">선택 삭제</button>
    <button class="danger-btn" onclick="deleteAllRecords()">전체 기록 삭제</button>
  </div>

  <div class="record-grid" id="recordGrid"></div>
</div>

<div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">CLOSE ✕</button>
  <img id="lightboxImg" src="" alt="screenshot">
</div>

<div class="reject-modal hidden" id="rejectModal">
  <div class="reject-box">
    <h3>반려 사유 입력</h3>
    <textarea id="rejectNote" placeholder="예: 날짜 불일치, 거리 차이 1km 이상..."></textarea>
    <div class="reject-actions">
      <button class="rej-confirm" onclick="confirmReject()">반려 처리</button>
      <button class="rej-cancel" onclick="closeRejectModal()">취소</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
APP.init();

const ADMIN_PW = "0000";
let flagOnly = false;
let selectedIds = new Set();
let rejectTargetId = null;

function checkPw() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PW) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    renderStats(); renderCards();
  } else {
    document.getElementById('pwError').textContent = '비밀번호가 틀렸습니다.';
  }
}

function toggleFlag() {
  flagOnly = !flagOnly;
  document.getElementById('flagToggle').classList.toggle('active', flagOnly);
  renderCards();
}

function renderStats() {
  const records = APP.getRecords();
  const pending  = records.filter(r => r.status === 'pending').length;
  const approved = records.filter(r => r.status === 'approved').length;
  const rejected = records.filter(r => r.status === 'rejected').length;
  const abnormal = records.filter(r => r.flagAbnormal).length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">검수 대기</div>
      <div class="stat-val" style="color:var(--c0)">${pending}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">승인 완료</div>
      <div class="stat-val" style="color:var(--c1)">${approved}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">반려</div>
      <div class="stat-val" style="color:var(--c2)">${rejected}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">비정상 의심</div>
      <div class="stat-val" style="color:var(--c3)">${abnormal}</div>
    </div>`;
}

function renderCards() {
  const statusFilter = document.getElementById('filterStatus').value;
  const teamFilter   = document.getElementById('filterTeam').value;
  const users   = APP.getUsers();
  let records = APP.getRecords().slice().sort((a,b) => b.submittedAt.localeCompare(a.submittedAt));

  if (statusFilter !== 'all') records = records.filter(r => r.status === statusFilter);
  if (teamFilter   !== 'all') {
    const tid = parseInt(teamFilter);
    const memberIds = users.filter(u => u.teamId === tid).map(u => u.id);
    records = records.filter(r => memberIds.includes(r.userId));
  }
  if (flagOnly) records = records.filter(r => r.flagAbnormal);

  const grid = document.getElementById('recordGrid');
  if (records.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">NO RECORDS FOUND</div>';
    return;
  }

  grid.innerHTML = records.map(r => {
    const user = users.find(u => u.id === r.userId);
    if (!user) return '';
    const team = APP.TEAMS[user.teamId];
    const isSelected = selectedIds.has(r.id);
    const submittedTime = new Date(r.submittedAt).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });

    let cardContent = '';
    if (r.status === 'pending') {
      cardContent = `
        <div class="card-actions">
          <button class="btn-approve" onclick="approve('${r.id}')">✓ 승인</button>
          <button class="btn-reject"  onclick="openReject('${r.id}')">✕ 반려</button>
        </div>`;
    } else if (r.status === 'approved') {
      cardContent = `<div class="status-done" style="color:var(--c1)">✓ APPROVED</div>`;
    } else {
      cardContent = `
        <div class="status-done" style="color:var(--c2)">✕ REJECTED</div>
        ${r.note ? `<div class="card-note">${r.note}</div>` : ''}`;
    }

    const flagBadge = r.flagAbnormal ? '<span class="card-flag flag-abnormal">⚠ ABNORMAL</span>' : `<span class="card-flag flag-${r.status}">${r.status.toUpperCase()}</span>`;

    return `<div class="record-card ${r.flagAbnormal ? 'abnormal' : ''} ${isSelected ? 'selected' : ''}" id="card-${r.id}">
      <div class="card-img-wrap" onclick="openLightbox('${r.id}')">
        <img src="https://placehold.co/260x140/1a1a1a/333?text=SCREENSHOT" alt="screenshot" onerror="this.src='https://placehold.co/260x140/1a1a1a/333?text=IMG'">
        ${flagBadge}
        ${r.status === 'pending' ? `<div class="card-sel-check" onclick="event.stopPropagation();toggleSelect('${r.id}')">${isSelected ? '✓' : ''}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-user">
          <div class="card-avatar" style="background:${team.color}22;color:${team.color}">${user.name.slice(0,1)}</div>
          <div class="card-name">${user.name}</div>
          <div class="card-team" style="color:${team.color}">${team.abbr}</div>
        </div>
        <div class="card-meta">
          <div class="card-km" style="color:${team.color}">${r.km.toFixed(1)} km</div>
          <div class="card-date">${r.date}</div>
        </div>
        <div class="card-submitted">제출: ${submittedTime}</div>
        ${cardContent}
      </div>
    </div>`;
  }).join('');
}

function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderCards();
}

function approve(id) {
  APP.reviewRecord(id, 'approved');
  selectedIds.delete(id);
  renderStats(); renderCards();
}

function openReject(id) {
  rejectTargetId = id;
  document.getElementById('rejectNote').value = '';
  document.getElementById('rejectModal').classList.remove('hidden');
}
function closeRejectModal() {
  rejectTargetId = null;
  document.getElementById('rejectModal').classList.add('hidden');
}
function confirmReject() {
  if (!rejectTargetId) return;
  const note = document.getElementById('rejectNote').value.trim();
  APP.reviewRecord(rejectTargetId, 'rejected', note);
  closeRejectModal();
  renderStats(); renderCards();
}

function bulkApprove() {
  if (selectedIds.size === 0) { alert('선택된 기록이 없어요.'); return; }
  if (!confirm(`선택된 ${selectedIds.size}건을 일괄 승인할까요?`)) return;
  selectedIds.forEach(id => APP.reviewRecord(id, 'approved'));
  selectedIds.clear();
  renderStats(); renderCards();
}

function openLightbox(id) {
  document.getElementById('lightbox').classList.remove('hidden');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.add('hidden');
}

function deleteSelected() {
  if (selectedIds.size === 0) { alert('선택된 기록이 없어요.\n카드의 체크박스를 먼저 선택해주세요.'); return; }
  if (!confirm(`선택된 ${selectedIds.size}건을 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
  const records = APP.getRecords().filter(r => !selectedIds.has(r.id));
  APP.setData('records', records);
  selectedIds.clear();
  renderStats(); renderCards();
}

// 핵심 수정: 데이터 리셋 후 seeded 상태를 true로 유지하여 데모 데이터 재생성 완벽 차단
function deleteAllRecords() {
  const total = APP.getRecords().length;
  if (total === 0) { alert('삭제할 기록이 없습니다.'); return; }
  const input = prompt(`전체 기록 ${total}건을 모두 삭제합니다.\n확인하려면 "삭제" 를 입력해주세요.`);
  if (input !== '삭제') { if (input !== null) alert('입력이 일치하지 않아 취소됐습니다.'); return; }
  
  APP.setData('records', []);
  APP.setData('seeded', true); // <-- 이 부분이 true로 변경됨
  
  selectedIds.clear();
  renderStats(); renderCards();
  alert(`✓ 전체 기록 ${total}건이 삭제됐습니다.`);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeRejectModal(); }
});
</script>
</body>
</html>
